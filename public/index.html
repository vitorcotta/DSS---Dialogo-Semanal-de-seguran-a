<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSS - Dialogo Semanal de Seguranca</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="hero__tag">Seguranca Operacional</p>
        <h1>Dialogo Semanal de Seguranca</h1>
        <p class="hero__subtitle">
          Cartazes oficiais da semana para manter foco, disciplina e continuidade do negocio.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="toolbar">
        <h2>Cartazes Publicados</h2>
        <button id="refreshButton" type="button">Atualizar painel</button>
      </section>

      <section id="gallery" class="gallery" aria-live="polite"></section>
    </main>

    <div id="lightbox" class="lightbox" hidden>
      <button id="lightboxClose" class="lightbox__close" type="button" aria-label="Fechar visualizacao">
        Fechar
      </button>
      <img id="lightboxImage" class="lightbox__image" src="" alt="" />
      <p id="lightboxTitle" class="lightbox__title"></p>
    </div>

    <footer class="footer">
      <p>Time DSS - Excelencia em seguranca e disponibilidade.</p>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
